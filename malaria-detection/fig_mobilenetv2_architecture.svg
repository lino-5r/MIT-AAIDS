  <text x="147" y="163" text-anchor="middle" font-size="8" fill="#F7F4EF" opacity="0.85" font-family="system-ui,sans-serif">64×64×3</text>
  <line x1="176" y1="155" x2="193" y2="155" stroke="#2C3440" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="194" y="70" width="200" height="170" rx="6" ry="6" fill="#1A4A5A"/>
