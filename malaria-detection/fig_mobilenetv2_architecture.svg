  <text x="294" y="169" text-anchor="middle" font-size="8" fill="#F7F4EF" opacity="0.8" font-family="system-ui,sans-serif">16× depthwise</text>
  <text x="294" y="181" text-anchor="middle" font-size="8" fill="#F7F4EF" opacity="0.8" font-family="system-ui,sans-serif">separable blocks</text>
  <line x1="394" y1="155" x2="411" y2="155" stroke="#2C3440" stroke-width="1.5" marker-end="url(#arr)"/>
