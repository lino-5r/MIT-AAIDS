  <text x="514" y="156" text-anchor="middle" font-size="9.5" font-weight="600" fill="#F7F4EF" font-family="system-ui,sans-serif">Dense</text>
  <text x="514" y="163" text-anchor="middle" font-size="8" fill="#F7F4EF" opacity="0.85" font-family="system-ui,sans-serif">128·ReLU</text>
  <line x1="547" y1="155" x2="564" y2="155" stroke="#2C3440" stroke-width="1.5" marker-end="url(#arr)"/>
