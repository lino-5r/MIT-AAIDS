  <text x="438" y="163" text-anchor="middle" font-size="8" fill="#F7F4EF" opacity="0.85" font-family="system-ui,sans-serif">1280</text>
  <line x1="464" y1="155" x2="481" y2="155" stroke="#2C3440" stroke-width="1.5" marker-end="url(#arr)"/>
