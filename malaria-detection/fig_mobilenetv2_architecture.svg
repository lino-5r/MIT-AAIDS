  <text x="587" y="163" text-anchor="middle" font-size="8" fill="#2C3440" opacity="0.85" font-family="system-ui,sans-serif">0.5</text>
  <line x1="610" y1="155" x2="627" y2="155" stroke="#2C3440" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="628" y="133" width="65" height="44" rx="4" ry="4" fill="#D95F4B"/>
  <text x="660" y="156" text-anchor="middle" font-size="9.5" font-weight="600" fill="#F7F4EF" font-family="system-ui,sans-serif">Dense</text>
  <text x="660" y="163" text-anchor="middle" font-size="8" fill="#F7F4EF" opacity="0.85" font-family="system-ui,sans-serif">1·Sigmoid</text>
  <line x1="194" y1="36" x2="394" y2="36" stroke="#C8C8C8" stroke-width="1"/>
  <line x1="194" y1="33" x2="194" y2="39" stroke="#C8C8C8" stroke-width="1"/>
  <line x1="394" y1="33" x2="394" y2="39" stroke="#C8C8C8" stroke-width="1"/>
  <text x="294" y="26" text-anchor="middle" font-size="9.5" fill="#AAAAAA" font-family="system-ui,sans-serif" letter-spacing="0.8">PRETRAINED BACKBONE</text>
  <line x1="412" y1="36" x2="693" y2="36" stroke="#C8C8C8" stroke-width="1"/>
  <line x1="412" y1="33" x2="412" y2="39" stroke="#C8C8C8" stroke-width="1"/>
  <line x1="693" y1="33" x2="693" y2="39" stroke="#C8C8C8" stroke-width="1"/>
  <text x="552" y="26" text-anchor="middle" font-size="9.5" fill="#AAAAAA" font-family="system-ui,sans-serif" letter-spacing="0.8">CUSTOM HEAD</text>
  <rect x="198" y="212" width="126" height="20" rx="3" ry="3" fill="#E8A838" opacity="0.9"/>
  <text x="261" y="226" text-anchor="middle" font-size="8" font-weight="600" fill="#2C3440" font-family="system-ui,sans-serif">Phase 2: top layers unfrozen</text>
  <text x="294" y="250" text-anchor="middle" font-size="8.5" fill="#999999" font-family="system-ui,sans-serif">7×7×1280  →  GAP  →  1280</text>
