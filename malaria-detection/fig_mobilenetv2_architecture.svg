<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300" style="background:#F7F4EF;system-ui,sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#2C3440"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1A6B7C" stroke-width="0.7" opacity="0.25"/>
    </pattern>
  </defs>
  <rect x="10" y="100" width="80" height="110" rx="5" ry="5" fill="#E8A838" stroke="#C8922A" stroke-width="1.5" stroke-dasharray="5,3"/>
