  <text x="50" y="179" text-anchor="middle" font-size="7.5" font-style="italic" fill="#2C3440" font-family="system-ui,sans-serif">(train only)</text>
  <line x1="90" y1="155" x2="117" y2="155" stroke="#2C3440" stroke-width="1.5" marker-end="url(#arr)"/>
